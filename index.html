<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER OSCE Simulator — Patient + Staff Rounds</title>
<style>
:root {
  --bg: #0f1923; --card: #162231; --card-hover: #1a2a3a;
  --accent: #3498db; --accent-dim: #1d3b5c;
  --warn: #e67e22; --danger: #e74c3c; --success: #27ae60;
  --text: #dce3ea; --text-muted: #8899aa; --border: #1e3347;
  --input-bg: #0d1520;
  --patient: #8e44ad; --staff: #3498db;
  --easy: #27ae60; --medium: #e67e22; --hard: #e74c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }

header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 14px 0; text-align: center;
}
header h1 { font-size: 1.3rem; color: var(--accent); }
header .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

/* Case grid */
.case-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px; padding: 28px 0;
}
.case-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.2s;
}
.case-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.case-card.completed { border-color: var(--success); }
.case-card .diff {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.diff-easy { background: #1a3a2a; color: var(--easy); }
.diff-medium { background: #3a2a1a; color: var(--medium); }
.diff-hard { background: #3a1a1a; color: var(--hard); }
.case-card h3 { font-size: 1.05rem; margin-bottom: 6px; }
.case-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }

/* Main simulation layout */
#sim-view { display: none; }
.sim-layout {
  display: grid; grid-template-columns: 1fr 280px;
  gap: 16px; padding: 16px 0; height: calc(100vh - 96px);
}

/* Chat area */
.chat-col { display: flex; flex-direction: column; min-width: 0; }
.chat-header {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.chat-header .case-title { font-weight: 600; color: var(--accent); flex: 1; }
.chat-header .btn { padding: 6px 12px; font-size: 0.8rem; }
#chat-messages {
  flex: 1; overflow-y: auto; padding: 14px 0;
  display: flex; flex-direction: column; gap: 10px;
}
#chat-messages::-webkit-scrollbar { width: 5px; }
#chat-messages::-webkit-scrollbar-track { background: var(--bg); }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg { max-width: 82%; padding: 10px 14px; border-radius: 10px; line-height: 1.55; font-size: 0.9rem; animation: fadeIn 0.25s ease; overflow-wrap: anywhere; word-break: break-word; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg-patient { align-self: flex-start; background: rgba(142,68,173,0.15); border: 1px solid rgba(142,68,173,0.25); border-bottom-left-radius: 3px; }
.msg-staff { align-self: flex-start; background: rgba(52,152,219,0.10); border: 1px solid rgba(52,152,219,0.2); border-bottom-left-radius: 3px; }
.msg-student { align-self: flex-end; background: var(--accent-dim); border-bottom-right-radius: 3px; }
.msg-system { align-self: center; font-style: italic; color: var(--text-muted); font-size: 0.8rem; text-align: center; max-width: 70%; }
.msg .role-tag {
  font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 4px;
}
.msg-patient .role-tag { color: var(--patient); }
.msg-staff .role-tag { color: var(--staff); }
.msg-student .role-tag { color: var(--text-muted); text-align: right; }

.typing { color: var(--text-muted); font-size: 0.78rem; padding: 6px 14px; align-self: flex-start; }
.typing span { animation: blink 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,60% { opacity: 0; } 100% { opacity: 1; } }

/* Input area */
.chat-input-area {
  display: flex; gap: 8px; padding: 12px 0;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.role-toggle { display: flex; gap: 4px; flex-shrink: 0; }
.role-btn {
  padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--input-bg); color: var(--text-muted); cursor: pointer;
  font-size: 0.78rem; font-weight: 600; transition: all 0.15s;
  white-space: nowrap;
}
.role-btn.active-patient { border-color: var(--patient); color: var(--patient); background: rgba(142,68,173,0.1); }
.role-btn.active-staff { border-color: var(--staff); color: var(--staff); background: rgba(52,152,219,0.1); }
#chat-input {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; color: var(--text);
  font-size: 0.88rem; outline: none; font-family: inherit; min-width: 0;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-muted); }

.btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 10px 16px; font-size: 0.88rem;
  cursor: pointer; font-weight: 600; white-space: nowrap; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { background: var(--border); color: var(--text); }

/* Checklist sidebar */
.checklist-col { flex-shrink: 0; }
.checklist-panel {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; height: 100%; overflow-y: auto;
}
.checklist-panel h3 {
  font-size: 0.85rem; color: var(--staff); margin-bottom: 12px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.checklist-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 0;
  font-size: 0.8rem; color: var(--text-muted); border-bottom: 1px solid rgba(255,255,255,0.03);
}
.checklist-item.done { color: var(--success); }
.checklist-item .check {
  width: 18px; height: 18px; border-radius: 3px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center; font-size: 0.65rem;
  flex-shrink: 0;
}
.checklist-item.done .check { background: var(--success); border-color: var(--success); color: #fff; }
.phase-divider {
  font-size: 0.68rem; color: var(--warn); font-weight: 600;
  padding: 8px 0 4px; text-transform: uppercase; letter-spacing: 1px;
}

/* Score screen */
.score-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 100; align-items: center; justify-content: center;
}
.score-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 32px; max-width: 420px; width: 90%; text-align: center;
}
.score-card h2 { color: var(--success); margin-bottom: 12px; }
.score-card .big-score { font-size: 2.8rem; font-weight: 700; color: var(--accent); }
.score-card .big-score span { font-size: 1.1rem; color: var(--text-muted); }
.score-card .check-summary { margin: 16px 0; text-align: left; font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; }
.score-card .check-summary .item { display: flex; gap: 6px; }
.score-card .check-summary .item .icon { color: var(--success); }

/* Mobile */
@media (max-width: 768px) {
  .sim-layout { grid-template-columns: 1fr; height: auto; }
  .checklist-col { order: -1; max-height: 200px; }
  .checklist-panel { max-height: 200px; }
  .case-grid { grid-template-columns: 1fr; }
  .msg { max-width: 92%; }
  .role-btn { padding: 6px 10px; font-size: 0.72rem; }
  #chat-messages { min-height: 300px; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <header>
    <h1>🏥 ER OSCE Simulator</h1>
    <div class="sub">Patient Interview + Staff Consultation — Dual-Role Clinical Simulation</div>
  </header>

  <!-- Case Selection -->
  <div id="case-select">
    <div class="case-grid" id="case-grid"></div>
  </div>

  <!-- Simulation View -->
  <div id="sim-view">
    <div class="sim-layout">
      <div class="chat-col">
        <div class="chat-header">
          <span class="case-title" id="sim-title"></span>
          <button class="btn btn-secondary" onclick="backToCases()">← Cases</button>
        </div>
        <div id="chat-messages"></div>
        <div class="chat-input-area">
          <div class="role-toggle">
            <button class="role-btn active-patient" id="btn-patient" onclick="setRole('patient')">👤 Patient</button>
            <button class="role-btn" id="btn-staff" onclick="setRole('staff')">👨‍⚕️ Staff</button>
          </div>
          <input type="text" id="chat-input" placeholder="Ask the patient…" onkeydown="if(event.key==='Enter')sendMessage()">
          <button class="btn" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
      <div class="checklist-col">
        <div class="checklist-panel" id="checklist-panel">
          <h3>✅ OSCE Checklist</h3>
          <div id="checklist-items"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Score Overlay -->
  <div class="score-overlay" id="score-overlay">
    <div class="score-card">
      <h2 id="score-title"></h2>
      <div class="big-score" id="score-num"></div>
      <div class="check-summary" id="score-checks"></div>
      <button class="btn" onclick="closeScore()">Back to Cases</button>
    </div>
  </div>
</div>

<script>
// ─── CASE DATA ──────────────────────────────────────────────
const CASES = [
  {
    id:"chest-pain", title:"Chest Pain — 55M", difficulty:"medium",
    desc:"55M smoker with HTN+DM, substernal chest pressure. Practice history taking, cardiac exam, ECG interpretation.",
    patientOpening:"Doctor, I've had this really bad chest pain for about 2 hours. It feels like something heavy sitting on my chest, and it goes into my left arm. I was just watching TV when it came on. I'm a bit sweaty and feel kind of sick to my stomach.",
    history:[
      {id:"onset",phase:"History",label:"Onset & timing",keywords:["when","start","begin","how long","onset","time","sudden","gradual","what happened","happen","how did","came on"],response:"It started about 2 hours ago. I was just sitting on the couch watching TV, nothing stressful or physical. It came on pretty suddenly."},
      {id:"character",phase:"History",label:"Pain character",keywords:["character","describe","quality","feel like","what kind","type","sharp","dull","pressure","severe","severity","bad","intensity","scale","rate","out of 10","score","pain scale","how bad","how much","location","where","area","site","point","radiate","radiation","spread","go","move","show me"],response:"It's a heavy pressure, like an elephant sitting on my chest. It's right in the middle, behind my breastbone (substernal). I'd say it's an 8 out of 10 in severity. It also goes up into my left arm and a little into my jaw."},
      {id:"associated",phase:"History",label:"Associated symptoms",keywords:["symptom","nausea","sweat","diaphoresis","sob","dyspnea","short of breath","vomit","dizzy","anything else","other symptom","also","besides","feel","how feel"],response:"I feel nauseous, like I might throw up, but I haven't. I've been sweating a lot — my shirt is soaked. I don't feel short of breath though."},
      {id:"risk",phase:"History",label:"Risk factors & PMH",keywords:["history","past","risk","hypertension","htn","diabetes","dm","smoke","medication","allergy"],response:"I've had high blood pressure and diabetes for about 10 years. I take metformin and enalapril. I've been smoking about a pack a day for 30 years. My dad had a heart attack when he was 58."},
      {id:"meds",phase:"History",label:"Medications & allergies",keywords:["medication","drug","allergy","aspirin","statin","take","pill"],response:"I take metformin 1000mg twice a day and enalapril 20mg. No allergies to medicines. I don't take anything else regularly."},
      {id:"social",phase:"History",label:"Social history",keywords:["social","drink","alcohol","job","work","live","family"],response:"I work in construction. I drink a few beers on weekends, nothing during the week. I live with my wife. We have two grown kids."}
    ],
    staffExam:[
      {id:"vitals",phase:"Physical Exam",label:"Vital signs",keywords:["vital","bp","hr","rr","sats","temp","pulse","blood pressure","numbers","reading","pressure","oxygen","saturation","rate","fever"],response:"<b>Vital Signs:</b> BP 148/92 mmHg, HR 102 bpm regular, RR 20/min, SpO₂ 96% on room air, Temp 36.8°C. Patient is diaphoretic and appears anxious."},
      {id:"cv",phase:"Physical Exam",label:"Cardiovascular exam",keywords:["cardio","heart","jvp","murmur","apex","chest","listen","auscultation","s1","s2"],response:"<b>CV Exam:</b> JVP not elevated. Heart sounds: regular S1/S2, no murmurs, rubs, or gallops. No peripheral edema. Peripheral pulses palpable, equal bilaterally."},

    ],
    staffData:[
      {id:"ecg",phase:"Investigations",label:"ECG",keywords:["ecg","ekg","electrocardiogram","st","elevation"],response:"<b>ECG:</b> Sinus tachycardia at 102 bpm. ST elevation 3mm in leads II, III, aVF. Reciprocal ST depression in aVL and I. Consistent with <b>inferior STEMI</b>."},
      {id:"cxr",phase:"Investigations",label:"Chest X-ray",keywords:["cxr","chest xray","x-ray","x ray","radiograph"],response:"<b>Chest X-ray:</b> Normal cardiac silhouette. Lungs clear. No pneumothorax, effusion, or infiltrate. Mediastinum normal."},
      {id:"trop",phase:"Investigations",label:"Troponin",keywords:["troponin","trop","cardiac enzyme","lab","blood","cbc"],response:"<b>Initial Labs:</b> Troponin I elevated at 2.4 ng/mL (ref <0.04). CBC, electrolytes pending. Lactate 1.8. Glucose 180 mg/dL."}

    diffAnswer:{keywords:["inferior","stemi","mi","myocardial","infarction","heart attack","acs","acute coronary"],response:"Correct — <b>Inferior STEMI</b>. Based on the ECG findings (II, III, aVF elevation) and clinical presentation."},
    mgmtAnswer:{keywords:["aspirin","asa","antiplatelet","morphine","heparin","pci","cath","thrombolytic","tnk","ticagrelor","clopidogrel","nitroglycerin"],response:"Good. Management includes: Aspirin 300mg, P2Y12 inhibitor (Ticagrelor), anticoagulation (Enoxaparin/UFH), analgesia (Morphine cautious with RV involvement). Reperfusion by primary PCI if within 90 min, or thrombolysis (TNK)."},
    checklistOrder:["onset","character","associated","risk","meds","social","vitals","cv","chest","ecg","cxr","trop","diff","mgmt"],
    endMessage:"Excellent OSCE performance! You systematically gathered history, examined the patient, ordered appropriate investigations, and made the correct diagnosis of Inferior STEMI."
  },
  {
    id:"anaphylaxis", title:"Anaphylaxis — 35F", difficulty:"medium",
    desc:"35F with rash, dyspnea, and hypotension after antibiotics. Practice recognition and emergency management.",
    patientOpening:"Doctor, I don't feel good at all. I took some antibiotics for a UTI about 15 minutes ago, and now I have this horrible rash all over my body. It's so itchy. I'm having trouble breathing too — my throat feels tight. I feel dizzy and lightheaded.",
    history:[
      {id:"onset2",phase:"History",label:"Onset & trigger",keywords:["when","start","antibiotic","amoxicillin","penicillin","allergy","allergic","what","take","medication","trigger","what happened","happen","tell me","how","how long","why","sudden"],response:"I took the amoxicillin about 15 minutes ago for my UTI. Almost right after, I started feeling weird — first the itching, then the rash came up, and now I can't breathe well."},
      {id:"allergy_hx",phase:"History",label:"Allergy history",keywords:["allergy","past","before","reaction","previous","ever","happen"],response:"I've never had a reaction like this before. I've taken antibiotics in the past and was fine. No known drug allergies."},
      {id:"other_meds",phase:"History",label:"Other medications",keywords:["medication","drug","other","take","pill","regular","contraception"],response:"I'm not on any regular medications. Just oral contraceptives. I've been healthy otherwise."}
    ],
    staffExam:[
      {id:"vitals_a",phase:"Physical Exam",label:"Vital signs",keywords:["vital","bp","hr","rr","sats","temp","pulse","blood pressure","numbers","reading","pressure","oxygen","saturation","rate","fever"],response:"<b>Vital Signs:</b> BP 85/50 mmHg, HR 120 bpm, RR 30/min, SpO₂ 91% on room air, Temp 37.1°C. Patient appears distressed, using accessory muscles."},
      {id:"skin",phase:"Physical Exam",label:"Skin & mucosal exam",keywords:["skin","rash","urticaria","hive","angioedema","lip","tongue","swelling","swollen","mucosal"],response:"<b>Skin/Mucosal:</b> Diffuse urticaria over trunk and limbs. Mild angioedema of lips. No tongue swelling compromising airway yet. Conjunctivae clear."},
      {id:"resp",phase:"Physical Exam",label:"Respiratory exam",keywords:["respiratory","chest","lung","wheeze","stridor","breath","auscultation","airway"],response:"<b>Respiratory:</b> Inspiratory stridor present. Bilateral expiratory wheezes. Using accessory muscles. Speaking in short phrases only."}
    ],
    staffData:[
      {id:"dx_a",phase:"Diagnosis",label:"Working diagnosis",keywords:["diagnosis","anaphylaxis","anaphylactic","shock","what is","think","allergic"],response:"<b>Working Diagnosis:</b> Anaphylaxis (drug-induced, amoxicillin). Meets criteria: acute skin/mucosal involvement + respiratory compromise + hypotension."},
      {id:"mgmt_a",phase:"Management",label:"Immediate management",keywords:["adrenaline","epinephrine","im","antihistamine","steroid","fluid","salbutamol","manage","treatment","give","drug"],response:"<b>Immediate Management:</b> ① Adrenaline 0.5mg IM anterolateral thigh (repeat q5-15min) ② High-flow O₂ ③ IV access + NSS bolus 1-2L ④ CPM 10mg IV ⑤ Hydrocortisone 200mg IV ⑥ Salbutamol neb 5mg for bronchospasm."}
    ],
    diffAnswer:{keywords:["anaphylaxis","anaphylactic","shock","allergic","reaction"],response:"Correct — <b>Anaphylaxis</b>. Drug-induced, rapid onset with skin + respiratory + cardiovascular involvement."},
    mgmtAnswer:{keywords:["adrenaline","epinephrine","im","0.5","antihistamine","cpm","steroid","hydrocortisone","fluid","bolus","salbutamol","neb"],response:"Good! Adrenaline IM is the #1 priority drug. Antihistamine, steroids, bronchodilator, and IV fluids are adjuncts. Observe for biphasic reaction."},
    checklistOrder:["onset2","allergy_hx","other_meds","vitals_a","skin","resp","dx_a","mgmt_a","diff","mgmt"],
    endMessage:"Well done! You correctly recognized anaphylaxis from the history and exam, and prioritized adrenaline as the life-saving intervention."
  },
  {
    id:"asthma", title:"Acute Asthma — 22F", difficulty:"easy",
    desc:"22F known asthmatic with acute dyspnea. Practice severity assessment and stepwise management.",
    patientOpening:"Doctor, I can't breathe... I've been wheezing since this morning and it keeps getting worse. I used my blue inhaler a few times but it's not helping. I can barely talk... (speaking in short, broken phrases, visibly using neck muscles to breathe)",
    history:[
      {id:"asthma_hx",phase:"History",label:"Asthma history & triggers",keywords:["asthma","history","past","trigger","before","ever","admitted","icu","intubated","severe","attack","exacerbation"],response:"I've had asthma since I was a kid. I've been to the ER a few times before, but never admitted to ICU. I think a cold triggered it this time — I've had a runny nose for a few days."},
      {id:"meds_a2",phase:"History",label:"Medications & compliance",keywords:["medication","inhaler","steroid","preventer","use","take","regular","compliance"],response:"I have a blue inhaler — salbutamol — that I use when I need it. I was supposed to use a brown preventer but I ran out a month ago and haven't gotten a new one. I used the blue one maybe 6-8 times today, last time was about 30 minutes ago."},
      {id:"other_hx",phase:"History",label:"Other history",keywords:["smoke","allergy","other","disease","pregnant","fever"],response:"I don't smoke. I'm allergic to cats and dust mites. No other medical problems. Not pregnant. No fever, just the runny nose and cough for a few days."}
    ],
    staffExam:[
      {id:"vitals_a2",phase:"Physical Exam",label:"Vital signs",keywords:["vital","bp","hr","rr","sats","temp","pefr","peak flow"],response:"<b>Vital Signs:</b> BP 130/80, HR 115 bpm, RR 32/min, SpO₂ 89% on RA, Temp 37.0°C. <b>PEFR:</b> 150 L/min (35% predicted)."},
      {id:"resp_a",phase:"Physical Exam",label:"Respiratory exam",keywords:["respiratory","chest","lung","wheeze","breath","auscultation","air entry","accessory"],response:"<b>Respiratory:</b> Diffuse expiratory wheezes bilaterally. Prolonged expiratory phase. Using accessory muscles (sternocleidomastoid). Speaking single words only. Chest hyperinflated."}
    ],
    staffData:[
      {id:"severity",phase:"Assessment",label:"Severity assessment",keywords:["severity","severe","life threatening","acute","classify","grade"],response:"<b>Severity: Acute Severe Asthma</b> — possibly life-threatening. Criteria: PEFR <50%, SpO₂ <92%, unable to complete sentences, accessory muscle use. <b>Life-threatening features:</b> SpO₂ <92%."},
      {id:"mgmt_a2",phase:"Management",label:"Treatment",keywords:["treatment","manage","oxygen","salbutamol","neb","ipratropium","steroid","prednisolone","magnesium","mgso4","give"],response:"<b>Treatment:</b> ① O₂ to target SpO₂ 94-98% ② Salbutamol 5mg + Ipratropium 0.5mg nebulized (back-to-back) ③ Prednisolone 50mg PO or Hydrocortisone 200mg IV ④ Consider IV Magnesium 2g if not improving."}
    ],
    diffAnswer:{keywords:["acute severe","severe asthma","life threatening","exacerbation","status"],response:"Correct — <b>Acute Severe Asthma</b>, with life-threatening features (SpO₂ <92%)."},
    mgmtAnswer:{keywords:["oxygen","salbutamol","neb","ipratropium","steroid","prednisolone","magnesium","mgso4"],response:"Good. Key treatment: O₂, SABA+ipratropium nebs, systemic steroids, IV Mg for severe cases. Reassess PEFR after treatment."},
    checklistOrder:["asthma_hx","meds_a2","other_hx","vitals_a2","resp_a","severity","mgmt_a2","diff","mgmt"],
    endMessage:"Good OSCE! You assessed severity systematically, recognized life-threatening features, and initiated appropriate stepwise management."
  }
];

// ─── APP STATE ──────────────────────────────────────────────
let currentCase = null, currentRole = 'patient';
let messages = [], coveredItems = new Set();
let isProcessing = false;

function loadProgress() {
  try {
    const raw = localStorage.getItem('er-osce-progress');
    if (!raw) return {};
    const p = JSON.parse(raw);
    return (typeof p === 'object' && !Array.isArray(p)) ? p : {};
  } catch { return {}; }
}
function saveProgress(p) {
  try { localStorage.setItem('er-osce-progress', JSON.stringify(p)); }
  catch { console.warn('save failed'); }
}

// ─── RENDER ─────────────────────────────────────────────────
function renderCaseGrid() {
  const grid = document.getElementById('case-grid');
  const progress = loadProgress();
  grid.innerHTML = CASES.map(c => {
    const done = progress[c.id]?.completed;
    return `<div class="case-card${done?' completed':''}" onclick="startCase('${c.id}')">
      <span class="diff diff-${c.difficulty}">${c.difficulty}</span>
      <h3>${c.title}</h3>
      <p>${c.desc}</p>
      ${done ? '<div style="color:var(--success);font-size:0.75rem;margin-top:8px">✓ Completed</div>' : ''}
    </div>`;
  }).join('');
}

function renderChecklist() {
  const panel = document.getElementById('checklist-items');
  const allItems = [];
  // Group by phase
  let currentPhase = '';
  currentCase.checklistOrder.forEach(id => {
    let item = currentCase.history.find(h => h.id === id) ||
               currentCase.staffExam.find(e => e.id === id) ||
               currentCase.staffData.find(d => d.id === id);
    if (id === 'diff') item = {id:'diff',phase:'Assessment',label:'Differential diagnosis'};
    if (id === 'mgmt') item = {id:'mgmt',phase:'Management',label:'Management plan'};
    if (!item) return;
    if (item.phase !== currentPhase) {
      currentPhase = item.phase;
      allItems.push({divider: currentPhase});
    }
    allItems.push({...item, done: coveredItems.has(item.id)});
  });
  
  panel.innerHTML = allItems.map(i => {
    if (i.divider) return `<div class="phase-divider">📋 ${i.divider}</div>`;
    const cls = i.done ? 'checklist-item done' : 'checklist-item';
    return `<div class="${cls}"><span class="check">${i.done?'✓':''}</span>${i.label}</div>`;
  }).join('');
}

function renderMessages() {
  const container = document.getElementById('chat-messages');
  container.innerHTML = messages.map(m => {
    if (m.type === 'system') return `<div class="msg msg-system">${m.text}</div>`;
    const tag = m.role === 'patient' ? '👤 Patient' : m.role === 'staff' ? '👨‍⚕️ Staff' : 'You';
    const cls = m.role === 'patient' ? 'msg-patient' : m.role === 'staff' ? 'msg-staff' : 'msg-student';
    return `<div class="msg ${cls}"><div class="role-tag">${tag}</div>${m.text}</div>`;
  }).join('');
  setTimeout(() => { const el = document.getElementById('chat-messages'); if(el) el.scrollTop = el.scrollHeight; }, 50);
}

// ─── START CASE ─────────────────────────────────────────────
function startCase(id) {
  const c = CASES.find(x => x.id === id);
  if (!c) return;
  const progress = loadProgress();
  currentCase = c;
  messages = progress[id]?.messages || [];
  coveredItems = new Set(progress[id]?.coveredItems || []);
  currentRole = 'patient';
  setRoleUI('patient');
  
  document.getElementById('case-select').style.display = 'none';
  document.getElementById('sim-view').style.display = 'block';
  document.getElementById('sim-title').textContent = c.title;
  
  if (messages.length === 0) {
    // Opening — patient introduces themselves
    messages.push({type:'msg',role:'system',text:'🏥 You enter the examination room. The patient is seated, appearing uncomfortable. A staff nurse is present.'});
    showTyping('patient', () => {
      messages.push({type:'msg',role:'patient',text:c.patientOpening});
      messages.push({type:'msg',role:'system',text:'💡 Start by asking the patient questions about their symptoms. Switch to Staff for exam findings.'});
      renderMessages();
      renderChecklist();
      saveCurrent();
    });
  } else {
    renderMessages();
    renderChecklist();
  }
  document.getElementById('chat-input').focus();
}

// ─── ROLE TOGGLE ────────────────────────────────────────────
function setRole(role) {
  currentRole = role;
  setRoleUI(role);
}
function setRoleUI(role) {
  const pb = document.getElementById('btn-patient');
  const sb = document.getElementById('btn-staff');
  const input = document.getElementById('chat-input');
  pb.className = 'role-btn' + (role === 'patient' ? ' active-patient' : '');
  sb.className = 'role-btn' + (role === 'staff' ? ' active-staff' : '');
  input.placeholder = role === 'patient' ? 'Ask the patient…' : 'Ask the staff…';
}

// ─── SEND ───────────────────────────────────────────────────
function sendMessage() {
  if (isProcessing) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentCase) return;
  
  isProcessing = true;
  input.disabled = true;
  document.getElementById('send-btn').disabled = true;
  input.value = '';
  
  messages.push({type:'msg',role:'student',text:text});
  renderMessages();
  
  let match = null;
  const norm = text.toLowerCase();
  
  if (currentRole === 'patient') {
    // Search patient history items
    for (const h of currentCase.history) {
      if (coveredItems.has(h.id)) continue;
      for (const kw of h.keywords) {
        if (norm.includes(kw.toLowerCase())) {
          match = {type:'patient', item:h, response:h.response};
          break;
        }
      }
      if (match) break;
    }
    // Check differential/management from patient perspective
    if (!match) {
      for (const kw of currentCase.diffAnswer.keywords) {
        if (norm.includes(kw.toLowerCase())) {
          match = {type:'patient', item:{id:'diff',label:'Differential'}, response:"(The patient can't answer that — ask the Staff about the diagnosis.)"};
          break;
        }
      }
    }
  } else {
    // Search staff exam + data items
    const allStaff = [...currentCase.staffExam, ...currentCase.staffData];
    for (const s of allStaff) {
      if (coveredItems.has(s.id)) continue;
      for (const kw of s.keywords) {
        if (norm.includes(kw.toLowerCase())) {
          match = {type:'staff', item:s, response:s.response};
          break;
        }
      }
      if (match) break;
    }
    // Check differential
    if (!match) {
      for (const kw of currentCase.diffAnswer.keywords) {
        if (norm.includes(kw.toLowerCase())) {
          match = {type:'staff', item:{id:'diff',label:'Differential'}, response:currentCase.diffAnswer.response};
          break;
        }
      }
    }
    // Check management
    if (!match) {
      for (const kw of currentCase.mgmtAnswer.keywords) {
        if (norm.includes(kw.toLowerCase())) {
          match = {type:'staff', item:{id:'mgmt',label:'Management'}, response:currentCase.mgmtAnswer.response};
          break;
        }
      }
    }
  }
  
  showTyping(currentRole, () => {
    if (match) {
      coveredItems.add(match.item.id);
      messages.push({type:'msg',role:match.type,text:match.response});
    } else {
      const fb = getFallback(currentRole);
      messages.push({type:'msg',role:currentRole,text:fb});
    }
    
    renderMessages();
    renderChecklist();
    saveCurrent();
    
    if (coveredItems.size >= currentCase.checklistOrder.length) {
      setTimeout(() => showScore(), 800);
    }
    
    isProcessing = false;
    input.disabled = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  });
}

function getFallback(role) {
  if (role !== 'patient') return "I don't have that information yet — can you be more specific about what you're looking for?";
  const uncovered = currentCase.history.filter(h => !coveredItems.has(h.id));
  if (uncovered.length === 0) return "I think we've covered my history, doctor. Maybe ask the Staff about the examination or test results?";
  const hints = uncovered.map(h => `"${h.label}"`).slice(0, 3);
  if (uncovered.length > 3) hints.push(`+${uncovered.length - 3} more`);
  return `I'm not sure what you mean, doctor. You could try asking about: ${hints.join(', ')}`;
}

function showTyping(role, cb) {
  const container = document.getElementById('chat-messages');
  const name = role === 'patient' ? 'Patient' : 'Staff';
  const div = document.createElement('div');
  div.className = 'typing';
  div.textContent = `${name} is responding`;
  const dots = document.createElement('span');
  dots.textContent = '...';
  div.appendChild(dots);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  setTimeout(() => { div.remove(); cb(); }, 600 + Math.random() * 600);
}

// ─── SCORE ──────────────────────────────────────────────────
function showScore() {
  const overlay = document.getElementById('score-overlay');
  const total = currentCase.checklistOrder.length;
  const done = coveredItems.size;
  const pct = Math.round(done/total*100);
  
  let grade;
  if (pct >= 90) grade = '⭐ Outstanding!';
  else if (pct >= 70) grade = '👍 Well done!';
  else grade = '📚 Keep practicing.';
  
  document.getElementById('score-title').textContent = grade;
  document.getElementById('score-num').innerHTML = `${done}<span> / ${total} items</span>`;
  
  // Show checklist summary
  document.getElementById('score-checks').innerHTML = currentCase.checklistOrder.map(id => {
    let item = currentCase.history.find(h => h.id === id) ||
               currentCase.staffExam.find(e => e.id === id) ||
               currentCase.staffData.find(d => d.id === id);
    const label = item?.label || (id === 'diff' ? 'Differential diagnosis' : id === 'mgmt' ? 'Management plan' : id);
    const ok = coveredItems.has(id);
    return `<div class="item"><span class="icon">${ok?'✓':'○'}</span> ${label} ${ok?'':'— missed'}</div>`;
  }).join('');
  
  overlay.style.display = 'flex';
  
  // Save
  const progress = loadProgress();
  progress[currentCase.id] = { completed: true, messages, coveredItems: [...coveredItems] };
  saveProgress(progress);
  renderCaseGrid();
}

function closeScore() {
  document.getElementById('score-overlay').style.display = 'none';
  backToCases();
}

function backToCases() {
  currentCase = null;
  document.getElementById('sim-view').style.display = 'none';
  document.getElementById('case-select').style.display = 'block';
  renderCaseGrid();
}

function saveCurrent() {
  if (!currentCase) return;
  const progress = loadProgress();
  progress[currentCase.id] = { completed: false, messages, coveredItems: [...coveredItems] };
  saveProgress(progress);
}

// ─── INIT ───────────────────────────────────────────────────
renderCaseGrid();
</script>
</body>
</html>
