<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ER Case Simulator — Attending Physician Rounds</title>
<style>
:root {
  --bg: #0f1923;
  --card: #162231;
  --card-hover: #1a2a3a;
  --accent: #3498db;
  --accent-dim: #1d3b5c;
  --warn: #e67e22;
  --danger: #e74c3c;
  --success: #27ae60;
  --text: #dce3ea;
  --text-muted: #8899aa;
  --border: #1e3347;
  --input-bg: #0d1520;
  --easy: #27ae60;
  --medium: #e67e22;
  --hard: #e74c3c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.container { max-width: 1080px; margin: 0 auto; width: 100%; padding: 0 16px; }

/* Header */
header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 0;
  text-align: center;
}
header h1 { font-size: 1.4rem; color: var(--accent); }
header .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
header .stats { 
  display: flex; justify-content: center; gap: 20px; margin-top: 8px; 
  font-size: 0.8rem; color: var(--text-muted);
}
header .stats span { color: var(--accent); }

/* Case Selection Grid */
.case-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding: 32px 0;
}
.case-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.case-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.case-card.completed { border-color: var(--success); }
.case-card.completed::after {
  content: '✓'; position: absolute; top: 12px; right: 16px;
  color: var(--success); font-size: 1.2rem; font-weight: bold;
}
.case-card .diff {
  display: inline-block; padding: 3px 10px; border-radius: 12px;
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.diff-easy { background: #1a3a2a; color: var(--easy); }
.diff-medium { background: #3a2a1a; color: var(--medium); }
.diff-hard { background: #3a1a1a; color: var(--hard); }
.case-card h3 { font-size: 1.05rem; margin-bottom: 6px; }
.case-card p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.5; }
.case-card .progress { 
  font-size: 0.75rem; color: var(--accent); margin-top: 10px; 
}

/* Chat View */
#chat-view { display: none; flex-direction: column; height: calc(100vh - 100px); }
#chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 0;
  display: flex; flex-direction: column; gap: 12px;
}
#chat-messages::-webkit-scrollbar { width: 6px; }
#chat-messages::-webkit-scrollbar-track { background: var(--bg); }
#chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 0.9rem; animation: fadeIn 0.3s ease; overflow-wrap: anywhere; word-break: break-word; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg-attending { align-self: flex-start; background: var(--card-hover); border-bottom-left-radius: 4px; }
.msg-attending .label { font-size: 0.7rem; color: var(--accent); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.msg-student { align-self: flex-end; background: var(--accent-dim); border-bottom-right-radius: 4px; }
.msg-student .label { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; text-align: right; }
.msg-system { align-self: center; font-style: italic; color: var(--text-muted); font-size: 0.8rem; text-align: center; max-width: 70%; }
.msg-feedback { font-size: 0.78rem; margin-top: 6px; padding: 6px 10px; border-radius: 6px; background: rgba(52,152,219,0.08); color: var(--accent); }
.msg-feedback.wrong { background: rgba(231,76,60,0.08); color: var(--danger); }
.msg-feedback.good { background: rgba(39,174,96,0.08); color: var(--success); }
.msg-feedback .score { font-size: 0.7rem; opacity: 0.7; margin-left: 6px; }

.typing { color: var(--text-muted); font-size: 0.8rem; padding: 8px 16px; align-self: flex-start; }
.typing span { animation: blink 1.4s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,60% { opacity: 0; } 100% { opacity: 1; } }

/* Input Area */
#chat-input-area {
  display: flex; gap: 10px; padding: 16px 0;
  border-top: 1px solid var(--border);
  position: sticky; bottom: 0; background: var(--bg);
}
#chat-input {
  flex: 1; background: var(--input-bg); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; color: var(--text);
  font-size: 0.9rem; outline: none; font-family: inherit;
}
#chat-input:focus { border-color: var(--accent); }
#chat-input::placeholder { color: var(--text-muted); }
.btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 12px 20px; font-size: 0.9rem;
  cursor: pointer; transition: opacity 0.2s; font-weight: 600;
  white-space: nowrap;
}
.btn:hover { opacity: 0.9; }
.btn-secondary { background: var(--border); color: var(--text); }
.btn-danger { background: var(--danger); }
.btn-small { padding: 6px 12px; font-size: 0.8rem; }

/* Chat header bar */
.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.chat-header .case-title { font-weight: 600; color: var(--accent); }
.chat-header .phase-info { font-size: 0.8rem; color: var(--text-muted); }

/* Score screen */
.score-screen {
  display: none; flex-direction: column; align-items: center;
  padding: 40px 20px; text-align: center;
}
.score-screen h2 { color: var(--success); font-size: 1.6rem; margin-bottom: 8px; }
.score-screen .score-num { font-size: 3rem; font-weight: 700; color: var(--accent); margin: 16px 0; }
.score-screen .score-num span { font-size: 1.2rem; color: var(--text-muted); }
.score-screen .feedback-text { color: var(--text-muted); max-width: 500px; line-height: 1.7; margin-bottom: 24px; }

/* All done screen */
.all-done { display: none; flex-direction: column; align-items: center; padding: 60px 20px; text-align: center; }
.all-done h1 { font-size: 2rem; color: var(--success); margin-bottom: 12px; }
.all-done p { color: var(--text-muted); margin-bottom: 24px; }

/* Vitals display */
.vitals-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px; font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 0.8rem; color: var(--text-muted); display: inline-block;
  margin: 8px 0;
}
.vitals-bar .v-abnormal { color: var(--danger); font-weight: 600; }
.vitals-bar .v-warn { color: var(--warn); }

/* Mobile */
@media (max-width: 768px) {
  .case-grid { grid-template-columns: 1fr; padding: 20px 0; }
  .msg { max-width: 90%; }
  header h1 { font-size: 1.2rem; }
  #chat-messages { padding: 12px 0; gap: 8px; }
  .btn { padding: 10px 16px; font-size: 0.85rem; }
  .chat-header { flex-wrap: wrap; gap: 6px; }
  .chat-header .phase-info { flex-basis: 100%; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Header -->
  <header>
    <h1>🏥 ER Case Simulator</h1>
    <div class="subtitle">Attending Physician Rounds — Interactive Case-Based Learning</div>
    <div class="stats">
      Completed: <span id="completed-count">0</span>/6 |
      Best Score: <span id="best-score">—</span>
    </div>
  </header>

  <!-- Case Selection -->
  <div id="case-selection">
    <div class="case-grid" id="case-grid"></div>
  </div>

  <!-- Chat View -->
  <div id="chat-view">
    <div class="chat-header">
      <span class="case-title" id="chat-title"></span>
      <span class="phase-info" id="phase-info"></span>
      <button class="btn btn-secondary btn-small" onclick="backToCases()">← Cases</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-area">
      <input type="text" id="chat-input" placeholder="Type your response…" onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Score Screen -->
  <div class="score-screen" id="score-screen">
    <h2 id="score-title"></h2>
    <div class="score-num" id="score-num"></div>
    <div class="feedback-text" id="score-feedback"></div>
    <button class="btn" onclick="returnToCases()">Back to Cases</button>
  </div>

  <!-- All Done -->
  <div class="all-done" id="all-done">
    <h1>🎉 All Cases Completed!</h1>
    <p>You've worked through all 6 ER cases. Ready for the next shift.</p>
    <button class="btn" onclick="resetAll()">Restart All Cases</button>
  </div>
</div>

// ─── APP STATE ──────────────────────────────────────────────
let currentCase = null;
let currentPhaseIdx = 0;
let currentScore = 0;
let messages = [];
let multiTrack = {}; // track multiPhase coverage per case
let isProcessing = false; // prevent double-send during async

function loadProgress() {
  try {
    const raw = localStorage.getItem('er-sim-progress');
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    // Validate structure — if corrupted, reset
    if (typeof parsed !== 'object' || Array.isArray(parsed)) {
      console.warn('Corrupted progress data, resetting');
      localStorage.removeItem('er-sim-progress');
      return {};
    }
    return parsed;
  }
  catch (e) { 
    console.warn('Failed to parse progress, resetting:', e.message);
    localStorage.removeItem('er-sim-progress');
    return {}; 
  }
}
function saveProgress(progress) {
  try { 
    const json = JSON.stringify(progress);
    localStorage.setItem('er-sim-progress', json);
  }
  catch (e) {
    // localStorage full — silently fail, app still works
    console.warn('Failed to save progress:', e.message);
  }
}
function getProgress() { return loadProgress(); }

// ─── RENDER CASE SELECTION ──────────────────────────────────
function renderCaseGrid() {
  const grid = document.getElementById('case-grid');
  const progress = getProgress();
  let html = '';
  CASES.forEach(c => {
    const p = progress[c.id];
    const done = p && p.completed;
    const inProgress = p && !p.completed && p.phaseIdx > 0;
    html += `<div class="case-card${done?' completed':''}" onclick="startCase('${c.id}')">
      <span class="diff diff-${c.difficulty}">${c.difficulty}</span>
      <h3>${c.title}</h3>
      <p>${c.description}</p>
      ${done ? '<div class="progress" style="color:var(--success)">✓ Completed — Score: '+p.score+'/'+c.maxScore+'</div>' : ''}
      ${inProgress ? '<div class="progress">▶ Continue — Phase '+(p.phaseIdx+1)+'/'+c.phases.length+'</div>' : ''}
    </div>`;
  });
  grid.innerHTML = html;
  updateStats();
}

function updateStats() {
  const progress = getProgress();
  const completed = CASES.filter(c => progress[c.id]?.completed).length;
  document.getElementById('completed-count').textContent = completed;
  let best = '—';
  if (completed > 0) {
    const scores = CASES.filter(c => progress[c.id]?.completed).map(c => progress[c.id].score);
    best = Math.max(...scores) + ' pts';
  }
  document.getElementById('best-score').textContent = best;
  
  if (completed === CASES.length) {
    document.getElementById('case-selection').style.display = 'none';
    document.getElementById('all-done').style.display = 'flex';
  }
}

// ─── START / CONTINUE CASE ──────────────────────────────────
function startCase(id) {
  const c = CASES.find(x => x.id === id);
  if (!c) return;
  const progress = getProgress();
  const p = progress[id];
  
  currentCase = c;
  currentScore = p?.score || 0;
  messages = p?.messages || [];
  multiTrack = (p?.multiTrack && typeof p.multiTrack === 'object') ? deserializeMultiTrack(p.multiTrack) : {};
  
  document.getElementById('case-selection').style.display = 'none';
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('chat-view').style.display = 'flex';
  document.getElementById('chat-title').textContent = c.title;
  
  if (messages.length === 0) {
    // Fresh case
    currentPhaseIdx = 0;
    processPhase();
  } else {
    // Resume
    currentPhaseIdx = p.phaseIdx || 0;
    if (currentPhaseIdx >= c.phases.length) {
      showScore();
    } else {
      renderMessages();
      document.getElementById('phase-info').textContent = `Phase ${currentPhaseIdx+1}/${c.phases.length}`;
    }
  }
  scrollToBottom();
}

// ─── PROCESS PHASE ──────────────────────────────────────────
function processPhase() {
  const phase = currentCase.phases[currentPhaseIdx];
  if (!phase) { showScore(); return; }
  
  document.getElementById('phase-info').textContent = `Phase ${currentPhaseIdx+1}/${currentCase.phases.length}`;
  
  // Skip pure info phases (no interactive responses) — show message then advance
  if (phase.responses.length === 0) {
    showTyping(() => {
      addMessage('attending', phase.attending);
      currentPhaseIdx++;
      renderMessages();
      saveCurrentState();
      scrollToBottom();
      if (currentPhaseIdx >= currentCase.phases.length) {
        setTimeout(() => showScore(), 400);
      } else {
        setTimeout(() => processPhase(), 800);
      }
    });
    return;
  }
  
  // Show typing indicator, then attending message
  showTyping(() => {
    addMessage('attending', phase.attending);
    renderMessages();
    scrollToBottom();
    saveCurrentState();
    document.getElementById('chat-input').focus();
  });
}

function showTyping(callback) {
  const container = document.getElementById('chat-messages');
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = 'Dr. Staff is typing<span>.</span><span>.</span><span>.</span>';
  container.appendChild(typing);
  scrollToBottom();
  setTimeout(() => {
    typing.remove();
    callback();
  }, 800 + Math.random() * 700);
}

// ─── MATCH RESPONSE ─────────────────────────────────────────
function matchResponse(input, phase) {
  const normalized = input.toLowerCase().trim();
  let bestMatch = null;
  
  for (const resp of phase.responses) {
    for (const kw of resp.keywords) {
      if (normalized.includes(kw.toLowerCase())) {
        if (!bestMatch || resp.score > bestMatch.score) {
          bestMatch = resp;
        }
      }
    }
  }
  return bestMatch;
}

// ─── SEND MESSAGE ───────────────────────────────────────────
function sendMessage() {
  if (isProcessing) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !currentCase || text.length === 0) return;
  isProcessing = true;
  input.disabled = true;
  input.value = '';
  
  const phase = currentCase.phases[currentPhaseIdx];
  if (!phase) { isProcessing = false; input.disabled = false; return; }
  
  addMessage('student', text);
  
  // Check if this is a multiPhase phase
  if (phase.multiPhase) {
    handleMultiPhase(text, phase);
    return;
  }
  
  const match = matchResponse(text, phase);
  
  if (match) {
    currentScore += match.score;
    let feedbackClass = '';
    if (match.score >= 4) feedbackClass = 'good';
    else if (match.score <= 1) feedbackClass = 'wrong';
    
    showTyping(() => {
      addMessage('attending', match.feedback, feedbackClass ? 
        `<div class="msg-feedback ${feedbackClass}">${match.score >= 4 ? '✓' : match.score <= 1 ? '⚠' : '•'} Score: +${match.score}<span class="score"></span></div>` : '');
      
      if (match.stay) {
        match.stayed = (match.stayed || 0) + 1;
        addSystemMsg('Keep going — what else?');
      } else if (match.next) {
        currentPhaseIdx = currentCase.phases.findIndex(p => p.id === match.next);
        if (currentPhaseIdx < 0) currentPhaseIdx++;
      } else {
        currentPhaseIdx++;
      }
      
      renderMessages();
      saveCurrentState();
      
      // Check if we've passed the last phase
      if (currentPhaseIdx >= currentCase.phases.length) {
        setTimeout(() => showScore(), 400);
      } else if (!match.stay) {
        setTimeout(() => processPhase(), 500);
      }
      scrollToBottom();
      isProcessing = false;
      input.disabled = false;
      input.focus();
    });
  } else {
    // No match — fallback
    showTyping(() => {
      addMessage('attending', phase.fallback || "I'm not sure I follow. Can you be more specific?", 
        '<div class="msg-feedback wrong">No keywords matched — try again</div>');
      renderMessages();
      saveCurrentState();
      scrollToBottom();
      isProcessing = false;
      input.disabled = false;
      input.focus();
    });
  }
}

function handleMultiPhase(text, phase) {
  const match = matchResponse(text, phase);
  
  if (match) {
    // Don't double-score duplicate topics
    if (!multiTrack[currentCase.id]) multiTrack[currentCase.id] = {};
    if (!multiTrack[currentCase.id][currentPhaseIdx]) multiTrack[currentCase.id][currentPhaseIdx] = new Set();
    
    const covered = multiTrack[currentCase.id][currentPhaseIdx];
    const isDuplicate = match.keywords.some(k => covered.has(k));
    
    if (!isDuplicate) {
      currentScore += match.score;
    }
    match.keywords.forEach(k => covered.add(k));
    
    let feedbackClass = match.score >= 4 ? 'good' : (match.score <= 1 ? 'wrong' : '');
    
    showTyping(() => {
      addMessage('attending', match.feedback, 
        `<div class="msg-feedback ${feedbackClass}">${isDuplicate ? '⚠ Already covered — no extra points' : '✓'} | Topics covered: ${covered.size}/${phase.coveredNeeded} needed</div>`);
      
      if (covered.size >= phase.coveredNeeded) {
        setTimeout(() => {
          addSystemMsg(phase.coveredMsg);
          currentPhaseIdx = currentCase.phases.findIndex(p => p.id === phase.coveredNext);
          if (currentPhaseIdx < 0) currentPhaseIdx++;
          renderMessages();
          saveCurrentState();
          // Check if we've passed last phase
          if (currentPhaseIdx >= currentCase.phases.length) {
            setTimeout(() => showScore(), 400);
          } else {
            setTimeout(() => processPhase(), 600);
          }
          scrollToBottom();
          isProcessing = false;
          document.getElementById('chat-input').disabled = false;
          document.getElementById('chat-input').focus();
        }, 600);
      } else {
        renderMessages();
        saveCurrentState();
        addSystemMsg(`Good. What else can you add? (${covered.size}/${phase.coveredNeeded} topics covered)`);
        scrollToBottom();
        isProcessing = false;
        document.getElementById('chat-input').disabled = false;
        document.getElementById('chat-input').focus();
      }
    });
  } else {
    showTyping(() => {
      addMessage('attending', phase.fallback || "Think about what else you can add...", 
        '<div class="msg-feedback wrong">Try mentioning another medication or intervention</div>');
      renderMessages();
      saveCurrentState();
      scrollToBottom();
      isProcessing = false;
      document.getElementById('chat-input').disabled = false;
      document.getElementById('chat-input').focus();
    });
  }
}

// ─── MESSAGE HELPERS ────────────────────────────────────────
function addMessage(type, text, extra) {
  messages.push({ type, text, extra: extra || '', ts: Date.now() });
}

function addSystemMsg(text) {
  messages.push({ type: 'system', text, extra: '', ts: Date.now() });
}

function renderMessages() {
  const container = document.getElementById('chat-messages');
  let html = '';
  messages.forEach(m => {
    if (m.type === 'attending') {
      html += `<div class="msg msg-attending">
        <div class="label">👨‍⚕️ Dr. Staff</div>
        ${m.text}
        ${m.extra}
      </div>`;
    } else if (m.type === 'student') {
      html += `<div class="msg msg-student">
        <div class="label">You</div>
        ${escapeHtml(m.text.length > 500 ? m.text.substring(0, 500) + '…' : m.text)}
      </div>`;
    } else if (m.type === 'system') {
      html += `<div class="msg msg-system">${m.text}</div>`;
    }
  });
  container.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── SCORE SCREEN ───────────────────────────────────────────
function showScore() {
  const c = currentCase;
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('score-screen').style.display = 'flex';
  
  let feedback = c.endMessage;
  const pct = currentScore / c.maxScore;
  let grade = '';
  if (pct >= 0.9) grade = '⭐ Outstanding!';
  else if (pct >= 0.7) grade = '👍 Well done!';
  else if (pct >= 0.5) grade = '📚 Good effort — keep studying.';
  else grade = '📖 Needs review — review the guidelines.';
  
  document.getElementById('score-title').textContent = grade;
  document.getElementById('score-num').innerHTML = `${currentScore}<span> / ${c.maxScore}</span>`;
  document.getElementById('score-feedback').textContent = feedback;
  
  // Mark complete
  const progress = getProgress();
  progress[c.id] = {
    completed: true,
    score: currentScore,
    phaseIdx: currentPhaseIdx,
    messages: messages,
    multiTrack: serializeMultiTrack(multiTrack)
  };
  saveProgress(progress);
}

function returnToCases() {
  currentCase = null;
  document.getElementById('score-screen').style.display = 'none';
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('case-selection').style.display = 'block';
  document.getElementById('all-done').style.display = 'none';
  renderCaseGrid();
  updateStats();
}

function backToCases() {
  saveCurrentState();
  returnToCases();
}

function resetAll() {
  localStorage.removeItem('er-sim-progress');
  currentCase = null;
  currentPhaseIdx = 0;
  currentScore = 0;
  messages = [];
  multiTrack = {};
  returnToCases();
}

function serializeMultiTrack(mt) {
  // JSON can't store Set objects — convert to arrays
  const out = {};
  for (const [key, val] of Object.entries(mt)) {
    if (val && typeof val === 'object') {
      out[key] = {};
      for (const [k, v] of Object.entries(val)) {
        out[key][k] = v instanceof Set ? [...v] : v;
      }
    }
  }
  return out;
}
function deserializeMultiTrack(mt) {
  const out = {};
  for (const [key, val] of Object.entries(mt)) {
    if (val && typeof val === 'object' && !Array.isArray(val)) {
      out[key] = {};
      for (const [k, v] of Object.entries(val)) {
        out[key][k] = Array.isArray(v) ? new Set(v) : v;
      }
    }
  }
  return out;
}

function saveCurrentState() {
  if (!currentCase) return;
  const progress = getProgress();
  progress[currentCase.id] = {
    completed: false,
    score: currentScore,
    phaseIdx: currentPhaseIdx,
    messages: messages,
    multiTrack: serializeMultiTrack(multiTrack)
  };
  saveProgress(progress);
}

function scrollToBottom() {
  setTimeout(() => {
    const el = document.getElementById('chat-messages');
    if (el) el.scrollTop = el.scrollHeight;
  }, 100);
}

// ─── INIT ───────────────────────────────────────────────────
renderCaseGrid();
updateStats();

// Check if all done
const prog = getProgress();
if (CASES.every(c => prog[c.id]?.completed)) {
  document.getElementById('case-selection').style.display = 'none';
  document.getElementById('all-done').style.display = 'flex';
}
</script>
